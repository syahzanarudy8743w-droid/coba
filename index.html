<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join us for the wedding of Riki & Puput.">
    <meta property="og:title" content="The Wedding of Riki & Puput">
    <meta property="og:description" content="Join us for the wedding of Riki & Puput.">
    <meta property="og:image" content="https://example.com/wedding-image.jpg">
    <meta property="og:url" content="https://example.com/wedding">
    <meta name="twitter:card" content="summary_large_image">
    <title>The Wedding of Riki & Puput</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: #f9f9f9;
            color: #333;
        }
        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: white;
        }
        header h1 {
            font-size: 2.5rem;
            margin: 0;
        }
        header p {
            font-size: 1.2rem;
            margin: 10px 0 0;
        }
        .countdown {
            text-align: center;
            margin: 20px 0;
        }
        .countdown div {
            display: inline-block;
            margin: 0 10px;
            text-align: center;
        }
        .countdown div span {
            display: block;
            font-size: 2rem;
            font-weight: bold;
        }
        .countdown div small {
            font-size: 0.9rem;
            color: #666;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            padding: 20px;
        }
        .gallery img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .rsvp {
            text-align: center;
            padding: 20px;
        }
        .rsvp form {
            max-width: 400px;
            margin: 0 auto;
        }
        .rsvp input, .rsvp button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .rsvp button {
            background: #ff9a9e;
            color: white;
            border: none;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>The Wedding of Riki & Puput</h1>
        <p>Saturday, October 11, 2026</p>
    </header>

    <section class="countdown">
        <div>
            <span id="days">0</span>
            <small>Days</small>
        </div>
        <div>
            <span id="hours">0</span>
            <small>Hours</small>
        </div>
        <div>
            <span id="minutes">0</span>
            <small>Minutes</small>
        </div>
        <div>
            <span id="seconds">0</span>
            <small>Seconds</small>
        </div>
    </section>

    <section class="gallery">
        <img src="https://example.com/image1.jpg" alt="Wedding Photo 1">
        <img src="https://example.com/image2.jpg" alt="Wedding Photo 2">
        <img src="https://example.com/image3.jpg" alt="Wedding Photo 3">
    </section>

    <section class="rsvp">
        <h2>RSVP</h2>
        <form action="https://example.com/rsvp" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <button type="submit">Submit</button>
        </form>
    </section>

    <footer>
        <p>Thank you for celebrating with us!</p>
    </footer>

    <script>
        // Countdown Timer
        const weddingDate = new Date('2026-10-11T08:30:00').getTime();
        const countdown = setInterval(() => {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;

            if (distance < 0) {
                clearInterval(countdown);
                document.querySelector('.countdown').textContent = 'The wedding has started!';
            }
        }, 1000);
    </script>
</body>
</html>
